version: "3.9"

services:
  app:
    image: ppt-builders:latest
    container_name: ppt-builders-app
    restart: unless-stopped
    ports:
      - "7784:7784"
    environment:
      - NODE_ENV=production
      - PORT=7784
      - DATABASE_URL=file:/data/prod.db
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - MEDIA_BACKEND=${MEDIA_BACKEND:-local}
      - NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_EMAIL=${VAPID_EMAIL}
    volumes:
      - ppt_data:/data
      - ppt_uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7784/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  ppt_data:
    driver: local
  ppt_uploads:
    driver: local
